  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }

    /* ── STATIC PRELOADER (paints before React boots) ── */
    #static-preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      contain: layout style;
    }

    #static-preloader .sp-loading {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80%;
      max-width: 400px;
      font-family: 'Exo 2', system-ui, sans-serif;
    }

    #static-preloader .sp-pct {
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 255, 235, 0.8), 0 0 20px rgba(0, 255, 235, 0.4);
    }

    #static-preloader .sp-text {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 500;
    }

    #static-preloader .sp-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.8), 0 0 1px rgba(255, 255, 255, 0.1);
    }

    #static-preloader .sp-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(0, 255, 235, 0.2), rgba(0, 255, 235, 0.8), #fff);
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 255, 235, 0.6), inset 0 0 5px rgba(255, 255, 255, 0.8);
      animation: staticBarGrow 2s ease-out forwards;
    }

    @keyframes staticBarGrow {
      to {
        width: 15%;
      }
    }

    @media (max-width: 768px) {
      #static-preloader .sp-loading {
        bottom: 20%;
      }
    }

    /* ── MOBILE JOYSTICK ── */
    #joystick-zone {
      position: fixed;
      bottom: max(30px, calc(env(safe-area-inset-bottom) + 20px));
      left: max(20px, env(safe-area-inset-left));
      width: 140px;
      height: 140px;
      z-index: 40;
      display: none;
      /* shown by JS on touch devices, after preloader */
      align-items: center;
      justify-content: center;
      touch-action: none;
    }

    #joystick-base {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(8, 8, 20, 0.6);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    #joystick-base.sprinting {
      border-color: rgba(255, 124, 79, 0.6);
      box-shadow: 0 0 18px rgba(255, 124, 79, 0.25), inset 0 0 12px rgba(255, 124, 79, 0.1);
    }

    #joystick-knob {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.85);
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      pointer-events: none;
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }

    #joystick-knob.active {
      background: rgba(79, 255, 170, 0.9);
      box-shadow: 0 0 14px rgba(79, 255, 170, 0.55);
    }

    #joystick-knob.sprinting {
      background: rgba(255, 124, 79, 0.9);
      box-shadow: 0 0 14px rgba(255, 124, 79, 0.55);
    }

    #joystick-zone.sprinting::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(255, 124, 79, 0.35);
      animation: sprintPulse 0.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes sprintPulse {

      0%,
      100% {
        opacity: 0.35;
        transform: scale(1);
      }

      50% {
        opacity: 0.7;
        transform: scale(1.06);
      }
    }
  </style>
</head>

<body>

  <!-- Static preloader: paints IMMEDIATELY before any JS loads.
       React's Preloader component will replace this when it mounts. -->
  <div id="static-preloader">
    <div class="sp-loading">
      <div class="sp-pct">0%</div>
      <div class="sp-text">Loading 3D Experience...</div>
      <div class="sp-bar-bg">
        <div class="sp-bar-fill"></div>
      </div>
    </div>
  </div>

  <div id="joystick-zone">
    <div id="joystick-base">
      <div id="joystick-knob"></div>
    </div>
  </div>

  <main id="root"></main>

  <script type="module" src="/src/main.tsx"></script>
</body>
